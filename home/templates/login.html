{% extends 'base.html' %}
{% load static %}

{% block title %}Login - SAGe{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white text-center py-3">
                <h2 class="mb-0"><i class="bi bi-person-circle me-2"></i>Login</h2>
            </div>
            <div class="card-body p-4">
                <form method="post" class="needs-validation" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="cpf" class="form-label fw-bold">CPF</label>
                        <input id="cpf" type="text" name="cpf" class="form-control" required placeholder="000.000.000-00">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">Senha</label>
                        <input id="password" type="password" name="password" class="form-control" required placeholder="Sua senha">
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                        <a href="{% url 'cadastro' %}" class="btn btn-link">Ainda não tem conta? Cadastre-se.</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
    function formatarCPF(cpf) {
        cpf = cpf.replace(/[^0-9]/g, '');
        if (cpf.length !== 11) {
            return cpf;
        }
        return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }

    const inputCPF = document.querySelector("#cpf");
    if (inputCPF) {
        inputCPF.addEventListener('input', function() {
            this.value = formatarCPF(this.value);
        });
    }
</script>
{% endblock %}
{% endblock %}
