{% extends 'base.html' %}
{% load static %}

{% block title %}Sucesso - SAGe{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0 bg-success text-white">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill display-1 mb-4"></i>
                <h1 class="h2 mb-3">Tudo certo!</h1>
                <p class="lead mb-4">Sua operação foi concluída com sucesso.</p>
                <div class="d-grid gap-2 d-md-block mt-4">
                    <a href="{% url 'home' %}" class="btn btn-light btn-lg px-5 me-md-2">Voltar para a Home</a>
                    {% if user.is_authenticated %}
                        <a href="{% url 'portal_do_paciente' id=user.id %}" class="btn btn-outline-light btn-lg px-5">Ir para o Portal</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
