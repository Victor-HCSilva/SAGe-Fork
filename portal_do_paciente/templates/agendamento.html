{% extends 'base.html' %}
{% load static %}

{% block title %}Agendar Consulta - SAGe{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0"><i class="bi bi-calendar-plus me-2"></i>Agendar Consulta</h2>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="dataConsulta" class="form-label fw-bold">Data da Consulta</label>
                        <input type="date" class="form-control" id="dataConsulta" name="data_consulta" required>
                    </div>
                    <div class="mb-3">
                        <label for="horaConsulta" class="form-label fw-bold">Hora da Consulta</label>
                        <select class="form-select" id="hora_consulta" name="hora_consulta" required>
                            <option value="" selected disabled>Selecione um horário</option>
                            {% for key, value in horarios.items %}
                                <option value="{{ key }}">{{ value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="medico" class="form-label fw-bold">Médico</label>
                        <select class="form-select" id="medico" name="id_medico" required>
                            <option value="" selected disabled>Selecione o Médico</option>
                            {% for medico in medicos %}
                                <option value="{{ medico.id }}">{{ medico.nome }} - {{ medico.especialidade }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Agendar Consulta</button>
                        <a href="{% url 'portal_do_paciente' id=paciente.id %}" class="btn btn-link text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
