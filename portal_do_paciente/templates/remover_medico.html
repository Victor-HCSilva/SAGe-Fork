{% extends 'base.html' %}
{% load static %}

{% block title %}Excluir Médico - SAGe{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm border-0">
            <div class="card-body p-5">
                <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-4"></i>
                <h1 class="h2 mb-3">Atenção!</h1>
                <p class="lead mb-4">Você tem certeza que deseja excluir o médico <strong>{{ medico.nome }}</strong> permanentemente do banco de dados?</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2 d-md-block">
                        <button type="submit" class="btn btn-danger btn-lg px-5 me-md-2">Sim, Remover</button>
                        <a href="{% url 'gestao_de_medicos' id=adm.id %}" class="btn btn-outline-secondary btn-lg px-5">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
